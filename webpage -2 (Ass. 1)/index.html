<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon Copy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />

  <body>
    <main class="container">
      <div class="pikachu"><img src="/pikachu.png" alt="Pikachu image" /></div>

        <div class="logo"><img src="/Pokemon_logo.png" alt="" /></div>
        <div class="content">
          <p>POKEMON GEN I</p>

          <h1>Pikachu</h1>

            Lorem ipsum, dolor sit amet consectetur<br />
            adipisicing elit. Voluptatem similique velit<br />
            commodi enim amet suscipit voluptates quasi<br />
            nobis veritatis id!
          </p>
        </div>
        <div class="bottom"><img src="/ball.png" alt="" /></div>
      </div>

      <div class="right">
        <div class="menu">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </main>
  </body>
</html>
