<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workerssal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav>
        <div class="logo">
          <div class="logoimg">
            <img src="/LOGO.png" alt="Workerssal Logo" />
          </div>
          <div class="logo-text">ScaleX</div>
        </div>

        <ul class="nav-links">
          <li><a href="#">Home</a></li>
          <li><a href="#">About Us</a></li>
          <li><a href="#">Blogs</a></li>
          <li><a href="#">Contact Us</a></li>
        </ul>
        <button>Get Started</button>
      </nav>
    </header>
    <section class="hero">
      <h1>Insights & Blogs</h1>
      <div class="buttons">
        <button class="filter-button">All</button>
        <button class="filter-button">Tech</button>
        <button class="filter-button">Saas</button>
        <button class="filter-button">Marketing</button>
      </div>
    </section>

    <section class="cards">
      <div class="card">
        <img src="/image-1.png" alt="Image 1 here" />

        <div class="card-content">
          <button class="category">Tech</button>
          <h2>The Ultimate Guide to SaaS Marketing</h2>
          <p>May 23, 2025</p>
        </div>
      </div>
      <div class="card">
        <img src="/image-2.png" alt="Image 2 here" />
        <div class="card-content">
          <button class="category">Saas</button>
          <h2>5 Key Trends in SaaS Growth For 2025</h2>
          <p>May 23, 2025</p>
        </div>
      </div>
      <div class="card">
        <img src="/image-3.png" alt="Image 3 here" />

        <div class="card-content">
          <button class="category">Marketing</button>
          <h2>How Data-Driven Strategies are Important</h2>
          <p>May 23, 2025</p>
        </div>
      </div>
    </section>
  </body>
</html>
